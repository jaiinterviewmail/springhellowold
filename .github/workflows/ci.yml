name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Build project
      - name: Build with Maven
        run: mvn clean package

      # 4. Run app briefly to generate logs (optional)
      - name: Run app for logs
        run: |
          mkdir -p logs
          java -jar target/*.jar &
          sleep 10
          pkill -f 'java -jar'

      # 5. Upload JAR artifact
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

      # 6. Upload logs artifact
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: logs/
